<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจสอบสมาชิก</title>
  <!-- นำเข้า LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
      background-color: #f5f5f5;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      margin: 0 auto;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    button:hover {
      background: #0056b3;
    }

    .btn-green {
      background: #06C755;
      margin-top: 10px;
    }

    .btn-green:hover {
      background: #05b34c;
    }

    .btn-red {
      background: #ff3b30;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px 15px;
    }

    .btn-red:hover {
      background: #cc2e26;
    }

    #profile-section {
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    #result-box {
      margin-top: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 5px;
      text-align: left;
      display: none;
      border: 1px solid #ddd;
    }

    #loading {
      color: #ff9800;
      font-weight: bold;
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="profile-section">
      <h3 style="margin: 0;" id="profile-name">กำลังโหลดข้อมูล LINE...</h3>
    </div>

    <h3>ตรวจสอบข้อมูลสมาชิก</h3>
    <div class="input-group">
      <label>เลขบัตรประชาชน (Customer ID):</label>
      <input type="text" id="customerId" placeholder="เช่น 3309900118024">
    </div>
    <div class="input-group">
      <label>รหัสสมาชิก (Member ID):</label>
      <input type="text" id="memberId" placeholder="เช่น 034658">
    </div>

    <button onclick="fetchData()">ค้นหาข้อมูล</button>
    <button class="btn-red" onclick="clearSavedData()" id="clearBtn" style="display:none;">ล้างข้อมูลที่จำไว้</button>

    <p id="loading">กำลังค้นหาข้อมูล...</p>

    <div id="result-box">
      <div id="api-data"></div>
      <button class="btn-green" id="sendBtn" style="display:none;" onclick="sendToChat()">ส่งข้อมูลเข้าห้องแชท</button>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009412063-oVeJr2wq";
    let currentMemberData = null;

    // เริ่มต้นระบบ LIFF
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          document.getElementById('profile-name').innerText = "สวัสดีคุณ " + profile.displayName;
          loadSavedData();
        } else {
          liff.login();
        }
      } catch (err) {
        console.error("LIFF Init Error", err);
      }
    }

    // ฟังก์ชันผูกข้อมูลสมาชิกกับ LINE User ID ใน Redis
    async function linkMemberToLineUser(customerId, memberId) {
      try {
        if (!liff.isLoggedIn()) {
          alert("กรุณาล็อกอิน LINE ก่อน");
          return;
        }

        const profile = await liff.getProfile();
        const userId = profile.userId;

        // ✅ แก้ไข: ใส่ URL เต็มๆ ของ Vercel เพื่อความชัวร์ (หรือใช้ /api/link-member ก็ได้ถ้าอยู่ในโดเมนเดียวกัน)
        const resp = await fetch("https://test-app-liff.vercel.app/api/link-member", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, customerId, memberId }),
        });

        if (!resp.ok) {
          const errorText = await resp.text();
          throw new Error(`Server ตอบกลับด้วย Error ${resp.status}: ${errorText}`);
        }
        
        const resJson = await resp.json();
        console.log("บันทึกสำเร็จ:", resJson);
        // alert("เชื่อมต่อข้อมูลกับ LINE สำเร็จแล้ว!"); // ปิดไว้ก่อนถ้ามั่นใจ
      } catch (err) {
        console.error("Link Error:", err);
        // 🚨 ตัวนี้จะบอกเราว่าทำไมบันทึกไม่ได้ (เช่น 404, 500 หรือ Failed to fetch)
        alert("🚨 เกิดข้อผิดพลาดตอนบันทึกข้อมูลไปที่ LINE: " + err.message);
      }
    }

    // ฟังก์ชันดึงข้อมูลจาก Local Storage
    function loadSavedData() {
      const savedCid = localStorage.getItem('saved_customerId');
      const savedMid = localStorage.getItem('saved_memberId');
      if (savedCid && savedMid) {
        document.getElementById('customerId').value = savedCid;
        document.getElementById('memberId').value = savedMid;
        document.getElementById('clearBtn').style.display = 'block';
      }
    }

    // ฟังก์ชันลบข้อมูลที่จำไว้
    function clearSavedData() {
      localStorage.removeItem('saved_customerId');
      localStorage.removeItem('saved_memberId');
      document.getElementById('customerId').value = '';
      document.getElementById('memberId').value = '';
      document.getElementById('clearBtn').style.display = 'none';
      document.getElementById('result-box').style.display = 'none';
      alert('ล้างข้อมูลเรียบร้อยแล้ว');
    }

    // ฟังก์ชันค้นหาข้อมูลจาก API และบันทึกข้อมูล
    async function fetchData() {
      const customerId = document.getElementById('customerId').value.trim();
      const memberId = document.getElementById('memberId').value.trim();

      if (!customerId || !memberId) {
        alert("กรุณากรอกข้อมูลให้ครบทั้ง 2 ช่อง");
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('result-box').style.display = 'none';

      try {
        const apiUrl = `https://uat-chapanakij.thaijobjob.com/api/uat/chatme/member/${customerId}/${memberId}`;
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const result = await response.json();

        if (result.respCode === "200" && result.data) {
          // ✅ อัปเดตข้อมูลปัจจุบันให้เป็นตัวล่าสุดจาก API ทันที
          currentMemberData = JSON.parse(JSON.stringify(result.data));

          localStorage.setItem('saved_customerId', customerId);
          localStorage.setItem('saved_memberId', memberId);

          // ✅ รอจนกว่าจะบันทึกลง Redis สำเร็จ
          await linkMemberToLineUser(customerId, memberId);

          let html = `
            <p><strong>ชื่อ-นามสกุล:</strong> ${currentMemberData.Name}</p>
            <p><strong>สถานะ:</strong> <span style="color:green;">${currentMemberData.Status}</span></p>
            <p><strong>ประเภทการลงทะเบียน:</strong> ${currentMemberData.RegisType}</p>
            <p><strong>ประเภทสมาชิก:</strong> ${currentMemberData.MemberType}</p>
            <hr>
            <p><strong>การชำระเงิน:</strong> ${currentMemberData.PaymentInfo.PayType}</p>
            <p><strong>ช่องทาง:</strong> ${currentMemberData.PaymentInfo.PayForm}</p>
          `;

          document.getElementById('api-data').innerHTML = html;
          document.getElementById('result-box').style.display = 'block';
          document.getElementById('sendBtn').style.display = 'block';
          document.getElementById('clearBtn').style.display = 'block';

          alert("ผูกข้อมูลสำเร็จ! ตอนนี้คุณสามารถพิมพ์ A ในแชทเพื่อดึงข้อมูลได้แล้ว");
        } else {
          alert("ไม่พบข้อมูลสมาชิกนี้");
        }
      } catch (error) {
        alert("Error: " + error.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // ฟังก์ชันส่งข้อความแชท
    function sendToChat() {
      if (!currentMemberData) {
        alert("ไม่พบข้อมูลที่จะส่ง");
        return;
      }

      // ✅ สร้างข้อความโดยดึงจาก currentMemberData ที่เราเพิ่งอัปเดตไป
      const textMessage =
        `[ข้อมูลสมาชิก]
        ชื่อ: ${currentMemberData.Name}
        สถานะ: ${currentMemberData.Status}
        ประเภท: ${currentMemberData.RegisType}
        การชำระเงิน: ${currentMemberData.PaymentInfo.PayForm}`;

      liff.sendMessages([{ type: 'text', text: textMessage }])
        .then(() => liff.closeWindow())
        .catch((err) => alert('Error: ' + err.message));
    }

    window.onload = main;
  </script>
</body>

</html>
