<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE Profile Card</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">LINE Profile Card</h1>
            <p class="text-gray-600 mt-2">ข้อมูลโปรไฟล์ LINE ของคุณ</p>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center">
            <div class="inline-flex items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <p class="text-gray-600 mt-4">กำลังโหลดข้อมูล...</p>
        </div>

        <!-- Profile Card -->
        <div id="profileCard" class="hidden max-w-md mx-auto">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <!-- Card Header with Background -->
                <div class="h-24 bg-gradient-to-r from-blue-500 to-green-500"></div>

                <!-- Card Body -->
                <div class="px-6 py-8">
                    <!-- Profile Image -->
                    <div class="flex justify-center -mt-16 mb-4">
                        <img 
                            id="profileImage" 
                            src="" 
                            alt="Profile" 
                            class="w-24 h-24 rounded-full border-4 border-white shadow-lg object-cover"
                        >
                    </div>

                    <!-- Profile Information -->
                    <div class="text-center">
                        <h2 id="displayName" class="text-2xl font-bold text-gray-800 mb-1"></h2>
                        <p id="userId" class="text-gray-500 text-sm mb-4 break-all"></p>
                    </div>

                    <!-- Profile Details -->
                    <div class="mt-6 space-y-4">
                        <!-- Status Message Section -->
                        <div class="bg-blue-50 rounded-lg p-4">
                            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Status Message</label>
                            <p id="statusMessage" class="text-gray-800 font-medium mt-2 min-h-6">ไม่มี status message</p>
                        </div>

                        <!-- User ID Section -->
                        <div class="bg-gray-50 rounded-lg p-4">
                            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide">User ID</label>
                            <p id="userIdDisplay" class="text-gray-800 font-mono text-xs mt-2 break-all"></p>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-6 flex gap-2">
                        <button 
                            onclick="refreshProfile()" 
                            class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
                        >
                            🔄 รีเฟรช
                        </button>
                        <button 
                            onclick="logout()" 
                            class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
                        >
                            🚪 ออกจากระบบ
                        </button>
                        <button 
                            onclick="closeApp()" 
                            class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-lg transition duration-200"
                        >
                            ✕ ปิด
                        </button>
                    </div>
                </div>
            </div>

            <!-- Info Box -->
            <div class="mt-6 bg-green-50 border-l-4 border-green-500 p-4 rounded">
                <p class="text-sm text-green-700">
                    <strong>✓ เชื่อมต่อ LINE สำเร็จ</strong><br>
                    ข้อมูลโปรไฟล์ของคุณถูกโหลดแล้ว
                </p>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden max-w-md mx-auto">
            <div class="bg-red-50 border border-red-200 rounded-lg p-6">
                <h3 class="text-lg font-bold text-red-800 mb-2">⚠️ เกิดข้อผิดพลาด</h3>
                <p id="errorMessage" class="text-red-700 mb-4"></p>
                <button 
                    onclick="location.reload()" 
                    class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
                >
                    ลองใหม่
                </button>
            </div>
        </div>
    </div>

    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <!-- Main App Script -->
    <script>
        // Initialize LIFF
        async function initLiff() {
            try {
                // แก้ไข: ใส่ LIFF ID ที่ใช้งานได้เข้าไปตรงๆ เป็น String
                const liffId = "2009443112-56ScfBJ6"; 
                
                await liff.init({ liffId: liffId });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                
                // Get Profile
                await loadProfile();
            } catch (error) {
                showError("เกิดข้อผิดพลาดในการเชื่อมต่อ LIFF: " + error.message);
            }
        }

        // Load Profile Data
        async function loadProfile() {
            try {
                const profile = await liff.getProfile();
                displayProfile(profile);
                console.log(profile);
            } catch (error) {
                showError("ไม่สามารถดึงข้อมูลโปรไฟล์: " + error.message);
            }
        }

        // Display Profile in Card
        function displayProfile(profile) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('profileCard').classList.remove('hidden');

            // Set profile data
            document.getElementById('profileImage').src = profile.pictureUrl;
            document.getElementById('displayName').textContent = profile.displayName;
            document.getElementById('userId').textContent = profile.userId;
            document.getElementById('userIdDisplay').textContent = profile.userId;
            document.getElementById('statusMessage').textContent = profile.statusMessage || "ไม่มี status message";
        }

        // Refresh Profile
        async function refreshProfile() {
            document.getElementById('profileCard').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            await loadProfile();
        }

        // Show Error
        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('profileCard').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // Logout
        function logout() {
            if (liff.isLoggedIn()) {
                liff.logout();
                window.location.reload();
            }
        }

        // Close App
        function closeApp() {
            liff.closeWindow();
        }

        // Wait for LIFF SDK to load before initializing
        window.addEventListener('load', () => {
            if (window.liff) {
                initLiff();
            }
        });
    </script>
</body>
</html>
